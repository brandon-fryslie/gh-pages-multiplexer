name: 'gh-pages-multiplexer'
description: 'Deploy static sites to versioned subdirectories on gh-pages'
author: 'bmf'

inputs:
  source-dir:
    description: 'Directory containing build output to deploy'
    required: true
  target-branch:
    description: 'Branch to deploy to'
    required: false
    default: 'gh-pages'
  ref-patterns:
    description: 'Glob patterns for refs that trigger deployment (comma-separated). Default: deploy all refs. Bypassed when `version` is set.'
    required: false
    default: '*'
  base-path-mode:
    description: 'Base path correction mode: "base-tag" (default), "rewrite", or "none". Use "none" when your build already sets the correct absolute base URL at build time (Vite `base`, Next.js `basePath`, Astro `base`, etc.) — the action will copy your files unchanged.'
    required: false
    default: 'base-tag'
  base-path-prefix:
    description: 'Override the repository base path (e.g., "/my-repo"). Auto-detected from GITHUB_REPOSITORY if not set.'
    required: false
    default: ''
  version:
    description: 'Explicit version slot name (e.g., "v1.2.3"). When set, overrides the ref-derived slot and bypasses ref-patterns filtering. Required if you want to deploy with a build-time base URL that matches a predetermined version path.'
    required: false
    default: ''
  widget-icon:
    description: 'Custom SVG markup for the navigation widget icon. Must be a complete <svg>...</svg> element. Default: built-in layers icon.'
    required: false
    default: ''
  widget-label:
    description: 'Label text shown on the widget handle when hovered. Supports the {version} token, which is replaced with the deployed version slot. Default: "{version}".'
    required: false
    default: ''
  widget-position:
    description: 'Where the widget tab appears, in the form "<edge> <vertical>". Edge is "right" or "left". Vertical is a percentage from the top (e.g. "80%"). Default: "right 80%".'
    required: false
    default: ''
  widget-color:
    description: 'Hex color (e.g. "#f97316") for the widget handle background. Default: bright orange "#f97316".'
    required: false
    default: ''
  token:
    description: 'GitHub token for pushing to the target branch'
    required: false
    default: '${{ github.token }}'

outputs:
  version:
    description: 'The deployed version name (sanitized from ref)'
  url:
    description: 'The URL of the deployed version'

runs:
  using: 'node24'
  main: 'dist/index.js'
